exclude: ^scripts/
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-added-large-files
    args: ["--maxkb=2000"]
    exclude: ^uv\.lock$|.*\.db$|.*\.bak$|.*\.sqlite$
  - id: check-ast
    exclude: ^(tests/|test/|scripts/|script/)
  - id: check-yaml
    args: ["--unsafe"]
  - id: check-toml
  - id: check-json
  - id: fix-byte-order-marker
    exclude: .gitignore
  - id: check-merge-conflict
  - id: detect-private-key
  - id: trailing-whitespace
  - id: end-of-file-fixer
    exclude: \.ttl$
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.2.2
  hooks:
  - id: ruff
    args: ["--fix", "--unsafe-fixes", "--ignore=E402"]
    exclude: ^(tests/|test/|scripts/|script/)
  - id: ruff-format
    exclude: ^(tests/|test/|scripts/|script/)
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.20.2
  hooks:
  - id: mypy
    additional_dependencies: [pydantic, types-PyYAML, types-requests]
    args: ["--ignore-missing-imports"]
    # Align with ruff/bandit/codespell, which all exclude tests — the repo does
    # not statically type-check test code (validated at runtime by pytest).
    exclude: ^(tests/|test/|scripts/|script/)
- repo: https://github.com/jendrikseipp/vulture
  rev: v2.16
  hooks:
  - id: vulture
    pass_filenames: false
    args: [".", "vulture_whitelist.py", "--min-confidence", "95", "--exclude", "node_modules,dotnet,.venv,build,tests"]
    require_serial: true
- repo: https://github.com/codespell-project/codespell
  rev: v2.4.2
  hooks:
  - id: codespell
    args: ["-L", "ans,linar,nam,tread,ot,disjointness,trough", "--ignore-words=.codespellignore"]
    exclude: ^(tests/|test/|scripts/|script/|\.specify/)
- repo: https://github.com/PyCQA/bandit
  rev: 1.9.4
  hooks:
  - id: bandit
    args: ["--skip", "B101,B104,B105,B110,B404,B603,B607,B608"]
    exclude: ^(tests/|test/|scripts/|script/|__tests__/|run_test\.py|\.specify/)
- repo: https://github.com/nbQA-dev/nbQA
  rev: 1.9.1
  hooks:
  - id: nbqa-ruff
    args: ["--fix"]
- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.5.11
  hooks:
  - id: uv-lock
- repo: local
  hooks:
  - id: check-mermaid
    name: Check Mermaid syntax
    entry: python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/mermaid_linter.py
    language: system
    files: \.md$
    pass_filenames: true
  - id: check-stubs
    name: Check for Active Stubs and TODOs
    entry: python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/check_stubs.py
    language: system
    types: [python]
  - id: check-no-env-sprawl
    name: Config-flag anti-sprawl (no new bare os.environ KG_/GRAPH_ reads)
    entry: python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/check_no_env_sprawl.py
    language: system
    pass_filenames: false
    always_run: true
  - id: check-concept-gaps
    name: Check Concept ID Gap contiguousness
    entry: python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/check_concept_gaps.py
    language: system
    files: concept_map\.md$
    pass_filenames: true
  - id: turtle-format
    name: Format Turtle with rdflib
    entry: python -m scripts.format_ttl
    language: python
    additional_dependencies: [rdflib]
    files: \.ttl$
    # SHACL shape files use anonymous `sh:property [ ]` shapes that rdflib's
    # turtle serializer cannot canonicalize idempotently (blank-node relabeling),
    # so the formatter would rewrite them on every run. They remain valid turtle
    # and are parsed/validated by the SHACL gate — just not cosmetically reformatted.
    exclude: ^agent_utilities/knowledge_graph/shapes/
  - id: pytest
    name: pytest
    entry: bash -c 'test_target="tests"; for d in tests/unit test/unit tests test; do if [ -d "$d" ]; then test_target="$d"; break; fi; done; if [ -f uv.lock ]; then uv run --all-extras pytest "$test_target" -q --tb=short -m "not slow" --timeout=60; else pytest "$test_target" -q --tb=short -m "not slow" --timeout=60; fi'
    language: system
    types: [python]
    pass_filenames: false
    always_run: false
  - id: check-agent-standards
    name: check agent standards
    entry: |-
      bash -c 'for f in $(find . -type f -name "agent_server.py" -not -path "*/\.venv/*" -not -path "*/__pycache__/*"); do grep -q "warnings.filterwarnings" "$f" && grep -q "file=sys.stderr" "$f" || { echo "Missing warnings.filterwarnings or file=sys.stderr in $f"; exit 1; }; done'
    language: system
    pass_filenames: false
    always_run: true
  - id: check-cli-help
    name: check cli help
    entry: |-
      bash -c 'for f in $(find . -type f \( -name "mcp_server.py" -o -name "agent_server.py" \) -not -path "*/\.venv/*" -not -path "*/__pycache__/*"); do mod=$(echo "$f" | sed -e "s/^\.\///" -e "s/\.py$//" -e "s/\//./g"); uv run python -m "$mod" --help >/dev/null || exit 1; done'
    language: system
    pass_filenames: false
    always_run: true
  - id: check-bumpversion
    name: validate bumpversion config
    entry: |-
      bash -c 'if [ -f ".bumpversion.cfg" ]; then bump2version patch --dry-run --allow-dirty; fi'
    language: system
    pass_filenames: false
    always_run: true
- repo: https://github.com/AleksaC/hadolint-py
  rev: v2.14.0
  hooks:
  - id: hadolint
    args:
    - --ignore=DL3008
    - --ignore=DL3015
    - --ignore=DL3009
    - --ignore=DL4006
    - --ignore=SC2102
- repo: https://github.com/IamTheFij/docker-pre-commit
  rev: v3.0.1
  hooks:
  - id: docker-compose-check
- repo: local
  hooks:
  - id: security-sanitizer
    name: Security and Garbage Sanitizer
    entry: python scripts/security_sanitizer.py
    language: python
    pass_filenames: false
    always_run: true
# Plan 10 guardrail gates. Each defends a specific failure vector and has a
# meta-test in tests/gates/ proving it trips on a broken fixture. BLOCKING gates
# pass today; ADVISORY gates carry a comment explaining the deferred dependency.
- repo: local
  hooks:
  # BLOCKING ---------------------------------------------------------------
  - id: guardrail-no-stub
    name: Guardrail — no production stubs
    entry: python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/check_no_stub.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-concept-freshness
    name: Guardrail — concept registry freshness
    entry: python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/check_concepts.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-no-pyo3
    name: Guardrail — PyO3 fully excised
    entry: bash /home/apps/workspace/agent-packages/epistemic-graph/scripts/check_no_pyo3.sh
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-parity
    name: Guardrail — cross-UI parity matrix
    entry: python3 /home/apps/workspace/agent-packages/scripts/check_parity.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-retrieval-quality
    name: Guardrail — retrieval quality (Recall@k / MRR floor)
    entry: python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/check_retrieval_quality.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-prod-profile
    name: Guardrail — production profile guard
    entry: bash -c 'cd /home/apps/workspace/agent-packages/agent-utilities && python3 -m pytest tests/scale/test_prod_profile_guard.py -q -p no:cacheprovider -o addopts="" -k "prod or profile"'
    language: system
    pass_filenames: false
    always_run: true
  # BLOCKING: the anti-sprawl gate (versioned clones, conflict artifacts,
  # botched-merge dividers, oversized tracked binaries). Plan-03 cleared all
  # botched-merge dividers, so this now runs BLOCKING.
  - id: guardrail-sprawl
    name: Guardrail — anti-sprawl
    entry: python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/check_sprawl.py
    language: system
    pass_filenames: false
    always_run: true
  # ADVISORY: the coupling gate enforces that geniusbot imports agent_utilities
  # only via the allowlisted adapter seam. Kept non-blocking while the
  # concurrent decoupling work stabilizes so in-flight churn can't block
  # commits. Remove the `|| true` once the adapter seam has settled.
  - id: guardrail-coupling-advisory
    name: Guardrail — geniusbot coupling (ADVISORY, decoupling in flight)
    entry: bash -c 'python3 /home/apps/workspace/agent-packages/agent-utilities/scripts/check_coupling.py || true'
    language: system
    pass_filenames: false
    always_run: true
    verbose: true
