exclude: ^scripts/
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-added-large-files
    args: ["--maxkb=2000"]
    exclude: ^uv\.lock$|.*\.db$|.*\.bak$|.*\.sqlite$
  - id: check-ast
    exclude: ^(tests/|test/|scripts/|script/)
  - id: check-yaml
    args: ["--unsafe"]
  - id: check-toml
  - id: check-json
  - id: fix-byte-order-marker
    exclude: .gitignore
  - id: check-merge-conflict
  - id: detect-private-key
  - id: trailing-whitespace
  - id: end-of-file-fixer
    exclude: \.ttl$
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.2.2
  hooks:
  - id: ruff
    args: ["--fix", "--unsafe-fixes", "--ignore=E402"]
    exclude: ^(tests/|test/|scripts/|script/)
  - id: ruff-format
    exclude: ^(tests/|test/|scripts/|script/)
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.20.2
  hooks:
  - id: mypy
    additional_dependencies: [pydantic, types-PyYAML, types-requests]
    args: ["--ignore-missing-imports"]
    # Align with ruff/bandit/codespell, which all exclude tests — the repo does
    # not statically type-check test code (validated at runtime by pytest).
    exclude: ^(tests/|test/|scripts/|script/)
- repo: https://github.com/jendrikseipp/vulture
  rev: v2.16
  hooks:
  - id: vulture
    pass_filenames: false
    args: [".", "vulture_whitelist.py", "--min-confidence", "95", "--exclude", "node_modules,dotnet,.venv,build,tests"]
    require_serial: true
- repo: https://github.com/codespell-project/codespell
  rev: v2.4.2
  hooks:
  - id: codespell
    args: ["-L", "ans,linar,nam,tread,ot,disjointness,trough,nd,numer,statics", "--ignore-words=.codespellignore"]
    exclude: ^(tests/|test/|scripts/|script/|\.specify/)
- repo: https://github.com/PyCQA/bandit
  rev: 1.9.4
  hooks:
  - id: bandit
    args: ["--skip", "B101,B104,B105,B110,B112,B404,B603,B607,B608"]
    exclude: ^(tests/|test/|scripts/|script/|__tests__/|run_test\.py|\.specify/)
- repo: https://github.com/nbQA-dev/nbQA
  rev: 1.9.1
  hooks:
  - id: nbqa-ruff
    args: ["--fix"]
- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.11.7
  hooks:
  # --locked: fail (don't silently rewrite) if uv.lock is out of sync with
  # pyproject.toml — keeps the committed lock authoritative and never stale.
  - id: uv-lock
    args: ["--locked"]
- repo: local
  hooks:
  - id: dependency-audit
    name: audit dependencies for known CVEs (OSV)
    entry: python3 scripts/audit_dependencies.py uv.lock
    language: system
    files: ^(uv\.lock|pyproject\.toml|\.security-audit-allow\.txt)$
    pass_filenames: false
  - id: check-mermaid
    name: Check Mermaid syntax
    entry: python3 scripts/mermaid_linter.py
    language: system
    files: \.md$
    pass_filenames: true
  - id: check-stubs
    name: Check for Active Stubs and TODOs
    entry: python3 scripts/check_stubs.py
    language: system
    types: [python]
  - id: check-no-env-sprawl
    name: Config-flag anti-sprawl (no new bare os.environ KG_/GRAPH_ reads)
    entry: python3 scripts/check_no_env_sprawl.py
    language: system
    pass_filenames: false
    always_run: true
  - id: env-var-drift
    name: Env-var / config drift guard (.env.example matches the code-read surface)
    entry: python3 -m agent_utilities.mcp.check_env_var_drift --check
    language: system
    pass_filenames: false
    always_run: true
  - id: check-concept-gaps
    name: Check Concept ID Gap contiguousness
    entry: python3 scripts/check_concept_gaps.py
    language: system
    files: concept_map\.md$
    pass_filenames: true
  - id: turtle-format
    name: Format Turtle with rdflib
    entry: python -m scripts.format_ttl
    language: python
    additional_dependencies: [rdflib]
    files: \.ttl$
    # SHACL shape files use anonymous `sh:property [ ]` shapes that rdflib's
    # turtle serializer cannot canonicalize idempotently (blank-node relabeling),
    # so the formatter would rewrite them on every run. They remain valid turtle
    # and are parsed/validated by the SHACL gate — just not cosmetically reformatted.
    exclude: ^agent_utilities/knowledge_graph/shapes/
  - id: check-ontology
    name: Ontology library — valid + connected (no unlinked/broken ontologies)
    entry: python3 scripts/check_ontology.py
    language: system
    pass_filenames: false
    always_run: true
  - id: check-skill-name-collision
    name: Skill names globally unique across the fleet (install-all, no overlap)
    entry: python3 scripts/check_skill_name_collision.py
    language: system
    pass_filenames: false
    always_run: true
  - id: pytest
    name: pytest
    entry: bash -c 'export AGENT_UTILITIES_TEST_REPO_GUARD=revert; test_target="tests"; for d in tests/unit test/unit tests test; do if [ -d "$d" ]; then test_target="$d"; break; fi; done; if [ -f uv.lock ]; then uv run --all-extras pytest "$test_target" -q --tb=short -m "not slow" --timeout=60; else pytest "$test_target" -q --tb=short -m "not slow" --timeout=60; fi'
    language: system
    types: [python]
    pass_filenames: false
    always_run: false
  - id: check-agent-standards
    name: check agent standards
    entry: |-
      bash -c 'for f in $(find . -type f -name "agent_server.py" -not -path "*/\.venv/*" -not -path "*/__pycache__/*"); do grep -q "warnings.filterwarnings" "$f" && grep -q "file=sys.stderr" "$f" || { echo "Missing warnings.filterwarnings or file=sys.stderr in $f"; exit 1; }; done'
    language: system
    pass_filenames: false
    always_run: true
  - id: check-cli-help
    name: check cli help
    entry: |-
      bash -c 'for f in $(find . -type f \( -name "mcp_server.py" -o -name "agent_server.py" \) -not -path "*/\.venv/*" -not -path "*/__pycache__/*"); do mod=$(echo "$f" | sed -e "s/^\.\///" -e "s/\.py$//" -e "s/\//./g"); uv run python -m "$mod" --help >/dev/null || exit 1; done'
    language: system
    pass_filenames: false
    always_run: true
  - id: check-bumpversion
    name: validate bumpversion config
    entry: |-
      bash -c 'if [ -f ".bumpversion.cfg" ]; then bump2version patch --dry-run --allow-dirty; fi'
    language: system
    pass_filenames: false
    always_run: true
- repo: https://github.com/AleksaC/hadolint-py
  rev: v2.14.0
  hooks:
  - id: hadolint
    args:
    - --ignore=DL3008
    - --ignore=DL3015
    - --ignore=DL3009
    - --ignore=DL4006
    - --ignore=SC2102
- repo: https://github.com/IamTheFij/docker-pre-commit
  rev: v3.0.1
  hooks:
  - id: docker-compose-check
- repo: local
  hooks:
  - id: security-sanitizer
    name: Security and Garbage Sanitizer
    entry: python scripts/security_sanitizer.py
    language: python
    pass_filenames: false
    always_run: true
# Plan 10 guardrail gates. Each defends a specific failure vector and has a
# meta-test in tests/gates/ proving it trips on a broken fixture. BLOCKING gates
# pass today; ADVISORY gates carry a comment explaining the deferred dependency.
- repo: local
  hooks:
  # BLOCKING ---------------------------------------------------------------
  - id: guardrail-no-stub
    name: Guardrail — no production stubs
    entry: python3 scripts/check_no_stub.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-concept-freshness
    name: Guardrail — concept registry freshness
    entry: python3 scripts/check_concepts.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-no-legacy-concepts
    name: Guardrail — no legacy CONCEPT ids (OKF-CIS)
    entry: python3 scripts/check_no_legacy_markers.py agent_utilities scripts
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-concept-domain-vocab
    name: Guardrail — OKF-CIS closed domain vocab + registered slugs
    entry: python3 scripts/check_domain_vocab.py agent_utilities
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-prompt-schema
    name: Guardrail — canonical prompt schema (StructuredPrompt)
    entry: python3 scripts/check_prompt_schema.py --strict
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-genesis-manifest
    name: Guardrail — genesis.yaml freshness
    entry: python3 scripts/check_genesis_manifest.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-surface-parity
    name: Guardrail — every feature reachable via gateway + MCP
    # Relative path so the gate analyzes the tree being committed (its script
    # derives ROOT/baseline from its own location) instead of an unrelated
    # absolute checkout — required for the gate to see this repo's source and
    entry: python3 scripts/check_surface_parity.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-cpd-drift
    name: Guardrail — Capability Power Descriptors stay in sync (Seam 8 CPD)
    entry: python3 scripts/check_cpd.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-kg-skill-coverage
    name: Guardrail — every graph-os verb has a kg-* skill
    # CONCEPT:AU-ECO.mcp.kg-skill-verb-coverage — third parity leg: the operator-facing kg-* skill suite must
    # stay 1:1 with the graph-os verb surface (no verb without a skill, no skill
    # pointing at a dead verb). Same core as tests/unit/test_gateway_mcp_parity.py,
    # run standalone for a fast crisp signal.
    entry: python3 -m agent_utilities.mcp.skill_coverage
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-no-pyo3
    name: Guardrail — PyO3 fully excised
    entry: bash /home/apps/workspace/agent-packages/epistemic-graph/scripts/check_no_pyo3.sh
    language: system
    pass_filenames: false
    always_run: true
  # ADVISORY: the cross-UI parity matrix (per CONTRIBUTING-guardrails.md at the
  # agent-packages workspace root) compares feature "Full"/"Absent" status across
  # the 3 UI frontends (agent-webui, agent-terminal-ui, geniusbot) via a
  # workspace-level `scripts/check_parity.py` + `design-system/parity_matrix.yaml`.
  # Neither has ever been implemented (confirmed absent from every repo's git
  # history workspace-wide, not merely moved/renamed) — building it is real
  # multi-repo product work (a genuine feature-parity audit across 3 frontends
  # this repo's worktree cannot touch), not a mechanical path fix, and
  # .github/workflows/guardrails.yml already documents this exact gate as
  # un-runnable in isolated per-repo CI for the same reason. Kept as a visible,
  # non-blocking advisory (rather than hard-failing every commit, in every
  # checkout, on a hardcoded host-specific absolute path that cannot exist
  # anywhere else). Flip back to blocking once the workspace-level script +
  # parity_matrix.yaml are actually built.
  - id: guardrail-parity
    name: Guardrail — cross-UI parity matrix (ADVISORY, script not yet implemented)
    entry: |-
      bash -c 'script=/home/apps/workspace/agent-packages/scripts/check_parity.py; if [ -f "$script" ]; then python3 "$script"; else echo "SKIP -- workspace-level scripts/check_parity.py + design-system/parity_matrix.yaml do not exist yet (see CONTRIBUTING-guardrails.md); advisory, not blocking"; fi'
    language: system
    pass_filenames: false
    always_run: true
    verbose: true
  - id: guardrail-retrieval-quality
    name: Guardrail — retrieval quality (Recall@k / MRR floor)
    entry: python3 scripts/check_retrieval_quality.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-prod-profile
    name: Guardrail — production profile guard
    # Runs in the repo being committed (pre-commit cwd = repo root) so worktrees
    # are gated on their OWN conftest/engine wiring, not the canonical checkout's.
    entry: bash -c 'python3 -m pytest tests/scale/test_prod_profile_guard.py -q -p no:cacheprovider -o addopts="" -k "prod or profile"'
    language: system
    pass_filenames: false
    always_run: true
  # BLOCKING: the anti-sprawl gate (versioned clones, conflict artifacts,
  # botched-merge dividers, oversized tracked binaries). Plan-03 cleared all
  # botched-merge dividers, so this now runs BLOCKING.
  - id: guardrail-sprawl
    name: Guardrail — anti-sprawl
    entry: python3 scripts/check_sprawl.py
    language: system
    pass_filenames: false
    always_run: true
  # ADVISORY: the coupling gate enforces that geniusbot imports agent_utilities
  # only via the allowlisted adapter seam. Kept non-blocking while the
  # concurrent decoupling work stabilizes so in-flight churn can't block
  # commits. Remove the `|| true` once the adapter seam has settled.
  - id: guardrail-coupling-advisory
    name: Guardrail — geniusbot coupling (ADVISORY, decoupling in flight)
    entry: bash -c 'python3 scripts/check_coupling.py || true'
    language: system
    pass_filenames: false
    always_run: true
    verbose: true
  # The four gates below mirror the CI "Guardrails" workflow (guardrails.yml) so
  # a push can't fail a gate that pre-commit didn't already catch locally.
  - id: guardrail-eval-corpus
    name: Guardrail — eval corpus
    entry: python3 scripts/check_eval_corpus.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-reliability-corpus
    name: Guardrail — reliability corpus
    entry: python3 scripts/check_reliability_corpus.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-liveness
    name: Guardrail — liveness ratchet
    entry: python3 scripts/check_liveness.py
    language: system
    pass_filenames: false
    always_run: true
  - id: guardrail-gate-meta-tests
    name: Guardrail — gate meta-tests (prove every gate can fail)
    # Runs in the repo being committed (pre-commit cwd = repo root) so worktrees
    # are gated on their OWN gate tests, matching the prod-profile guard above.
    entry: bash -c 'python3 -m pytest tests/gates -q -p no:cacheprovider -o addopts=""'
    language: system
    pass_filenames: false
    always_run: true
# ── CI parity: gates that live in a CI workflow but had no pre-commit mirror ──
# These close the remaining CI<->pre-commit parity gaps so that
# `pre-commit run --all-files` (default stage) == the union of the non-deploy,
# non-nightly CI gates, and `--hook-stage manual` adds the deploy/nightly build
# gates. Nothing CI checks is left out; heavy gates are staged (not omitted).
- repo: local
  hooks:
  # concept-governance.yml — Extend-Before-Invent gate. New CONCEPT: tags must
  # carry a design doc + a registered pillar prefix. Relative entry so the diff
  # runs against the repo being committed (the worktree), not the canonical
  # checkout. Fast → default (pre-commit) stage, runs on every --all-files.
  - id: check-concept-governance
    name: CI parity — concept governance (Extend-Before-Invent)
    entry: python3 scripts/check_concept_governance.py
    language: system
    pass_filenames: false
    always_run: true
  # pages.yml — `mkdocs build` (the docs build step of the GitHub Pages deploy
  # workflow). Staged manual/pre-push: it provisions an isolated mkdocs env and
  # is heavier than a per-commit gate, and the deploy itself is push-to-main
  # only. Run it via:  pre-commit run docs-build --hook-stage manual --all-files
  - id: docs-build
    name: CI parity — mkdocs docs build (pages.yml)
    entry: bash -c 'mkdocs build --site-dir "$(mktemp -d)/site"'
    language: python
    additional_dependencies: [mkdocs-material, mkdocs-awesome-pages-plugin]
    pass_filenames: false
    always_run: true
    stages: [manual, pre-push]
  # pipeline.yml — `uv build` (the wheel/sdist build step of the PyPI release
  # workflow). Mirrors the packaging build so a broken pyproject/packaging is
  # caught locally instead of on the release push. Staged manual/pre-push.
  # Run it via:  pre-commit run wheel-build --hook-stage manual --all-files
  - id: wheel-build
    name: CI parity — package build (pipeline.yml uv build)
    entry: bash -c 'uv build --out-dir "$(mktemp -d)/dist"'
    language: system
    pass_filenames: false
    always_run: true
    stages: [manual, pre-push]
  # backend-parity (replaces the deleted backend-parity-nightly.yml). That nightly
  # ran the LIVE cross-backend conformance matrix, which needs a running engine +
  # Docker testcontainers (pggraph/AGE, Neo4j, FalkorDB, Fuseki) and so could never
  # be a per-commit gate — it was never reliably green. Here it is split:
  #
  # 1. STATIC contract surrogate — DEFAULT stage, engine-free + fast (~5s, pure class
  #    introspection): asserts every concrete `GraphBackend` implements the SAME
  #    abstract interface, so a backend that drops/renames a contract method is caught
  #    on every commit. This is the engine-free portion the nightly couldn't run here.
  # Plain `python3 -m pytest` (not `uv run --all-extras`): this static surrogate only
  # needs `agent_utilities` importable — NO extras, NO engine — so it stays green
  # without resolving the full optional-dependency set (and runs in ~5s on every commit).
  - id: backend-interface-parity
    name: CI parity — backend interface parity (static, engine-free)
    entry: python3 -m pytest tests/unit/test_backend_interface_parity.py -q -p no:cacheprovider -o addopts=""
    language: system
    pass_filenames: false
    always_run: true
  # 2. The LIVE behavioral matrix stays available on demand — staged manual only
  #    (needs Docker + a running engine; never on a normal commit/push).
  #    Run it via:  pre-commit run backend-parity --hook-stage manual --all-files
  - id: backend-parity
    name: CI parity — live backend conformance matrix (manual; Docker + engine)
    entry: bash -c 'AGENT_UTILITIES_TESTING=true python3 -m pytest tests/integration/backends -m live -rs --timeout=900'
    language: system
    pass_filenames: false
    always_run: true
    stages: [manual]
  # docs-consistency gate (tests/docs) — README concept block in sync with
  # docs/concepts.yaml, AGENTS.md regenerated + under its size ceiling, no cache
  # dirs leaked into the project tree. NOT run by the unit-pytest scope (tests/unit)
  # NOR by CI, yet it catches real doc drift on every concept change — so mirror it
  # here (fast, ~7s). Default stage so it runs on every --all-files.
  - id: docs-consistency
    name: CI parity — docs consistency (README/AGENTS vs concepts.yaml)
    entry: bash -c 'if [ -f uv.lock ]; then uv run --all-extras pytest tests/docs -q -p no:cacheprovider -o addopts=""; else python3 -m pytest tests/docs -q -p no:cacheprovider -o addopts=""; fi'
    language: system
    pass_filenames: false
    always_run: true
  # guardrails.yml ENVIRONMENT parity — the highest-value parity closure. The
  # gates above run in the developer's FULL install; CI's "Guardrails" job runs
  # them in a deliberately LEAN install (`pip install -e .` + numpy/pyyaml/pytest/
  # rdflib/pyshacl/owlrl — NO [agent]/[all] extras). A gate that transitively
  # imports an extra-only dep (pydantic_ai, httpx, fastmcp, …) passes locally but
  # dies in CI. This hook reproduces CI's lean env in a throwaway venv and runs
  # EVERY guardrail gate inside it (install + gate list both derived from
  # guardrails.yml, so it can't drift). It builds a venv → staged manual/pre-push,
  # too slow for every commit. Run it via:
  #   pre-commit run guardrails-lean-parity --hook-stage manual --all-files
  - id: guardrails-lean-parity
    name: CI parity — guardrail gates in a CI-equivalent LEAN venv
    entry: python3 scripts/run_guardrails_lean.py
    language: system
    pass_filenames: false
    always_run: true
    stages: [manual, pre-push]
