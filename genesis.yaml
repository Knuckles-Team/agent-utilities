# Genesis Manifest — generated by scripts/gen_genesis_manifest.py. Do NOT edit by hand.
#
# The single index an agent (or scripts/install.sh) loops to deploy agent-utilities:
#   1. pick a `profile`            (tiny | single-node-prod | enterprise)
#   2. run `preflight`             (does this host have the runtimes/tools?)
#   3. install + generate config   (scripts/install.sh -> setup-config)
#   4. wire the MCP `servers`      (via the profile's `skill`)
#   5. wire any `components` + `ide_targets`, then `verify`
#
# Composes existing sources (mcp-fleet.registry.yml, config profiles, docs/recipes/*,
# the deployment preflight) — it does not duplicate them. Regenerate after changing
# any of those; scripts/check_genesis_manifest.py gates drift.
version: 1
entrypoints:
  preflight: agent-utilities-doctor --preflight --profile <profile> [--component <c>]
  install: 'scripts/install.sh (Windows: scripts/install.ps1)'
  config: setup-config generate --profile <profile>
  verify: agent-utilities-doctor
  single_node_skill: agent-utilities-deployment
  multi_node_skill: agent-os-genesis
profiles:
  tiny:
    summary: zero-infra, all-local (laptop / Raspberry Pi) — homelab quick start
    recipe: docs/recipes/tiny.md
    docker: false
    secrets: engine-encrypted-or-dotenv
    servers: none
    skill: agent-utilities-deployment
    orchestrator: docker-compose
    install_mode: deploy-baremetal
    idp: none
    ontology_host: local
    engine: autostart
    engine_tier: pi-max
    engine_lifecycle: refcounted
    engine_idle_shutdown_secs: 60
  single-node-prod:
    summary: one durable, secured host (Postgres/pg-age) + the core MCP connectors
    recipe: docs/recipes/single-node-prod.md
    docker: true
    secrets: openbao-or-engine-encrypted
    servers: core
    skill: agent-utilities-deployment
    orchestrator: docker-swarm
    install_mode: deploy-container
    idp: keycloak
    ontology_host: local
    engine: container
    engine_tier: node
    engine_lifecycle: refcounted
    engine_idle_shutdown_secs: 60
  enterprise:
    summary: multi-host Docker Swarm, full integration (Vault/SSO/DNS/ingress/observability + all connectors)
    recipe: docs/recipes/enterprise.md
    docker: true
    secrets: openbao
    servers: all
    skill: agent-os-genesis
    orchestrator: kubernetes
    install_mode: deploy-container
    idp: keycloak
    ontology_host: stardog
    engine: remote
    engine_tier: cluster
    engine_lifecycle: refcounted
    engine_idle_shutdown_secs: 60
run_plan:
  actions:
  - deploy-container
  - deploy-baremetal
  - use-existing
  - skip
  orchestrators:
  - docker-compose
  - docker-swarm
  - podman
  - podman-compose
  - kubernetes
  podman_modes:
  - rootful
  - rootless
  idp:
  - keycloak
  - okta
  - other-oidc
  - none
  secrets_store:
  - engine
  - vault
  - env
  ontology_hosts:
  - stardog
  - apache-jena
  - local
  engine:
  - autostart
  - container
  - remote
  engine_tiers:
  - pi
  - pi-max
  - node
  - cluster
  - full
  install_modes:
  - deploy-container
  - deploy-baremetal
  - use-existing
  - skip
  install_variants:
  - prod
  - dev
  messaging:
    channels:
    - slack
    - teams
    - telegram
    - mattermost
    - discord
    - whatsapp
    - matrix
    - signal
    reach_modes:
    - last-active
    - broadcast
  single_package_deploy:
    invoke: deploy <package> with agent-os-genesis
    catalog: universal-skills agent-os-genesis references/connector-catalog.md
  provisioner_by_orchestrator:
    docker-swarm: swarm-mesh-provisioner
    kubernetes: kubernetes-mesh-provisioner
    podman: podman-mesh-provisioner
    podman-compose: podman-mesh-provisioner
    docker-compose: docker-compose-operator
preflight:
  command: agent-utilities-doctor --preflight
  mcp_action: graph_configure action=preflight config_key=<profile>
  always:
  - python>=3.11,<3.15
  - uv-or-pip
  - epistemic-graph>=1.0.0 — a prebuilt multi-arch WHEEL (linux x86_64/aarch64, macOS, windows); a Pi
    pip-installs the lean pi/pi-max tier and NEVER compiles. Rust toolchain only as a build-from-source
    fallback.
  docker_when: profile != tiny
engine:
  version: epistemic-graph>=1.0.0
  extra: pip install 'agent-utilities[engine]'  (bumps to the published wheel)
  authority: redb-authoritative durable by default (CONCEPT:KG-2.195)
  resolver: CONCEPT:OS-5.63 — remote -> share-running-local -> autostart the pi-tier binary; refcounted
    (auto-stops idle) or persistent lifecycle
  wheels: prebuilt multi-arch (linux x86_64/aarch64, macOS x86_64/arm64, windows) — the Pi tiers never
    compile
  docker_image: engine-as-a-DB multi-arch image (linux/amd64+arm64) for container/remote shapes (single-node-prod,
    enterprise)
  tiers:
    pi: '~6.46MB lean Pi-3: graph+cypher+ann+rdf/sparql/owl+streaming (pure-Rust, no DataFusion/C)'
    pi-max: '~6.96MB: pi + tsdb+blob+security/encryption-at-rest (still pure-Rust, no DataFusion/C)'
    node: pi-max + SQL/DataFusion+GraphQL+Tantivy text+reasoning+wasm-udf+federation
    cluster: node + multi-Raft replication+pgwire+distributed/cross-shard-2PC (HA)
    full: all single-node features, size-optimized (no raft/pgwire)
  secret_store:
    graph: __secrets__
    label: Secret
    encryption_key_env: EPISTEMIC_GRAPH_ENCRYPTION_KEY
    note: default embedded secret store (OS-5.66); needs a security-feature tier (pi-max/node/cluster/full).
      Local SQLite caches (registry graph, card cache, time-series) also route to the engine — no SQLite
      fallback.
components:
  agent-terminal-ui:
    connect: http
    deps:
    - python>=3.11
    container: true
    note: thin Textual TUI over the gateway; many fit on a Pi-class node
  agent-webui:
    connect: http
    deps:
    - node>=18
    - pnpm>=10
    container: needs-dockerfile
    note: React/Vite SPA + FastAPI; talks to the gateway over /api/*
  geniusbot:
    connect: import
    deps:
    - python>=3.11
    - PySide6/Qt6
    - libGL
    - libxcb
    - display
    container: false
    note: PySide6 desktop app; needs an X11/Wayland display — not headless/cloud
ide_targets:
  install_skills: install-skills --all-detected
  install_mcp: mcp-installer --all-detected
  harness_fence: setup-config harness-fence --target ~/.claude
  tools:
  - claude
  - claude-desktop
  - windsurf
  - opencode
  - openclaw
  - antigravity
  - codex
  - devin
  - cursor
  - zed
  - agent-utilities
  - agent-terminal-ui
servers:
  source: deploy/mcp-fleet.registry.yml
  transport: streamable-http
  count: 59
  core_count: 7
  core:
  - caddy-mcp
  - container-manager-mcp
  - freshrss-mcp
  - openbao-mcp
  - pulselink-mcp
  - technitium-dns-mcp
  - vector-mcp
