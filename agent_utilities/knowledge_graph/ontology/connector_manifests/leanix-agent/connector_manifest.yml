- "auth: 3 interchangeable paths \u2014 browser OAuth2/PKCE (auth-code + refresh via offline_access),\
  \ OIDC delegated-token exchange, or LeanIX 'technical user' bearer token. Env: LEANIX_AUTH_METHOD, LEANIX_WORKSPACE,\
  \ LEANIX_TECHNICAL_USER, LEANIX_TECHNICAL_USER_PASSWORD, LEANIX_TOKEN/LEANIX_API_TOKEN, LEANIX_BROWSER_LOGIN,\
  \ LEANIX_OAUTH_CLIENT_ID/SCOPE/REDIRECT_PORT, AUDIENCE, DELEGATED_SCOPES. required_scopes: LEANIX_OAUTH_SCOPE\
  \ default 'openid offline_access'; DELEGATED_SCOPES default 'api'; no fact-sheet-level LeanIX permission\
  \ scope found in code. Shape: default (LEANIX_AUTH_METHOD=technical) is a single shared technical-user\
  \ credential; browser OAuth is the per-user delegated fallback."
- "change_support: snapshot/poll only, via mcp_source_presets.json (delta+hydrate+writeback \u2014 see\
  \ docs/architecture/kg_connectors_and_ingestion.md section 8 connector inventory for the real, already-shipped\
