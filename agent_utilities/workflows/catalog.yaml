# Workflow Catalog — CONCEPT:ORCH-1.24
#
# Defines reusable orchestration scenarios as structured YAML.
# Each workflow is a DAG of steps that can be:
#   - Loaded into GraphPlan objects
#   - Persisted in the Knowledge Graph
#   - Executed via WorkflowRunner
#   - Exported as JSON for external consumers
#
# Step dependencies:
#   depends_on: []       → can run in parallel with other independent steps
#   depends_on: [0]      → sequential, waits for step 0
#   depends_on: [0, 1]   → waits for both step 0 AND step 1

workflows:
  # ─── Infrastructure Workflows ───────────────────────────────────────

  - name: container_health_check
    description: >
      Full Docker infrastructure health assessment.
      Lists containers, images, volumes, and networks,
      then retrieves logs from a running container.
    domain: infrastructure
    tags: [docker, health, monitoring, containers]
    requires: [DOCKER_HOST, container-manager-mcp]
    timeout_seconds: 180
    steps:
      - agent: container-manager-mcp
        task: "List all running containers and their current status"
        expected: [container, running, status]
      - agent: container-manager-mcp
        task: "List all Docker images with their sizes and tags"
        expected: [image, tag]
        depends_on: []
      - agent: container-manager-mcp
        task: "Show all Docker volumes and networks"
        expected: [volume, network]
        depends_on: [0, 1]
      - agent: container-manager-mcp
        task: "Get the logs for one of the running containers"
        expected: [log]
        depends_on: [0]

  - name: system_observability_sweep
    description: >
      Cross-system health and resource check combining
      system metrics with Langfuse observability status.
    domain: infrastructure
    tags: [monitoring, health, cross-system, observability]
    requires: [systems-manager, langfuse-mcp]
    timeout_seconds: 3600
    steps:
      - agent: systems-manager
        task: "Get the system memory usage, CPU stats, and disk utilization"
        expected: [memory, cpu]
      - agent: langfuse-mcp
        task: "Check the Langfuse health endpoint and list all current datasets"
        expected: [health, dataset]
        depends_on: []
      - agent: langfuse-mcp
        task: "List the most recent traces and their status"
        expected: [trace]
        depends_on: [1]

  - name: tunnel_and_network_audit
    description: >
      Audit active SSH tunnels and network connectivity
      alongside system network interface status.
    domain: infrastructure
    tags: [tunnels, network, security, audit]
    requires: [tunnel-manager, systems-manager]
    timeout_seconds: 3600
    steps:
      - agent: tunnel-manager
        task: "List all active tunnels from the inventory"
        expected: [tunnel]
      - agent: systems-manager
        task: "Show network interface stats and active connections"
        expected: [network, interface]
        depends_on: []
      - agent: systems-manager
        task: "Get the system's firewall rules summary"
        expected: [firewall, rule]
        depends_on: [0, 1]

  - name: deploy_platform_stack
    description: >
      End-to-end deployment of an infrastructure platform
      using docker-compose files and Portainer MCP.
    domain: infrastructure
    tags: [deployment, portainer, docker, stack, infrastructure]
    requires: [portainer-mcp]
    timeout_seconds: 600
    steps:
      - agent: portainer-mcp
        task: "Use portainer_environment to get the endpoint ID where the stack will be deployed."
        expected: [endpoint, id]
      - agent: portainer-mcp
        task: "Use portainer_stack to create the standalone stack from the docker-compose file."
        expected: [stack, create]
        depends_on: [0]

  # ─── Research Workflows ─────────────────────────────────────────────

  - name: research_discovery_pipeline
    description: >
      Search for papers, explore categories, and
      download relevant publications for offline analysis.
    domain: research
    tags: [arxiv, papers, discovery, summarization]
    requires: [scholarx-mcp]
    timeout_seconds: 240
    steps:
      - agent: scholarx-mcp
        task: "List available research paper sources and their categories"
        expected: [source, categories]
      - agent: scholarx-mcp
        task: "Search for recent papers on multi-agent orchestration systems"
        expected: [paper, agent]
        depends_on: [0]
      - agent: scholarx-mcp
        task: "Get details on the most relevant paper from the search results"
        expected: [abstract, author]
        depends_on: [1]

  - name: ai_research_survey
    description: >
      Comprehensive AI research survey combining paper
      search with data science capabilities for analysis.
    domain: research
    tags: [ai, survey, papers, data-science]
    requires: [scholarx-mcp, data-science-mcp]
    timeout_seconds: 300
    steps:
      - agent: scholarx-mcp
        task: "Search for recent papers on large language model agents published in 2025-2026"
        expected: [paper, language, model]
      - agent: data-science-mcp
        task: "Describe the iris dataset using the describe_dataset tool to verify data science capabilities"
        expected: [dataset, feature]
        depends_on: []
      - agent: scholarx-mcp
        task: "Search for papers on knowledge graph reasoning and retrieval augmented generation"
        expected: [knowledge, graph]
        depends_on: []

  # ─── Development Workflows ──────────────────────────────────────────

  - name: workspace_inventory
    description: >
      Full workspace discovery — list available workspace
      actions, repositories, and validate project structure.
    domain: development
    tags: [workspace, git, validation, repositories]
    requires: [repository-manager-mcp]
    timeout_seconds: 180
    steps:
      - agent: repository-manager-mcp
        task: "Use the rm_workspace tool to list the available actions for the workspace"
        expected: [list, setup]
      - agent: repository-manager-mcp
        task: "List all managed repositories in the workspace with their status"
        expected: [repository]
        depends_on: [0]

  - name: workspace_health_check
    description: >
      Combined workspace + system health validation.
      Checks repository state alongside system resources.
    domain: development
    tags: [workspace, health, systems, cross-domain]
    requires: [repository-manager-mcp, systems-manager]
    timeout_seconds: 180
    steps:
      - agent: repository-manager-mcp
        task: "List the available workspace actions and current workspace configuration"
        expected: [workspace, list]
      - agent: systems-manager
        task: "Get current system memory and CPU utilization"
        expected: [memory, cpu]
        depends_on: []
      - agent: systems-manager
        task: "Check disk usage for the main workspace partition"
        expected: [disk, usage]
        depends_on: [1]

  # ─── Mixed / Cross-Domain Workflows ─────────────────────────────────

  - name: full_ecosystem_health
    description: >
      End-to-end ecosystem health check across containers,
      system resources, workspace, and observability stack.
      This is the "canary" workflow that validates all
      infrastructure layers are operational.
    domain: operations
    tags: [ecosystem, health, canary, full-stack]
    requires: [container-manager-mcp, systems-manager, langfuse-mcp, repository-manager-mcp]
    timeout_seconds: 300
    steps:
      - agent: systems-manager
        task: "Get system memory, CPU, and disk stats"
        expected: [memory, cpu]
      - agent: container-manager-mcp
        task: "List all running Docker containers and their health status"
        expected: [container, running]
        depends_on: []
      - agent: langfuse-mcp
        task: "Check Langfuse health and list recent traces"
        expected: [health]
        depends_on: []
      - agent: repository-manager-mcp
        task: "List workspace actions and verify workspace configuration"
        expected: [workspace, list]
        depends_on: []

  - name: capability_discovery
    description: >
      Discovery workflow that probes available capabilities
      across MCP servers. Tests tool introspection, not
      execution — useful for building capability maps.
    domain: meta
    tags: [discovery, capabilities, introspection, meta]
    requires: [audio-transcriber, data-science-mcp, scholarx-mcp]
    timeout_seconds: 3600
    steps:
      - agent: audio-transcriber
        task: "Describe the capabilities of the transcribe_audio tool"
        expected: [transcribe, audio]
      - agent: data-science-mcp
        task: "Describe the available data science tools and their parameters"
        expected: [dataset, tool]
        depends_on: []
      - agent: scholarx-mcp
        task: "List available research paper sources"
        expected: [source]
        depends_on: []

  - name: observability_and_research
    description: >
      Combined observability check with research discovery.
      Validates Langfuse is healthy while concurrently
      searching for papers on agent observability.
    domain: research
    tags: [observability, research, langfuse, cross-domain]
    requires: [langfuse-mcp, scholarx-mcp]
    timeout_seconds: 240
    steps:
      - agent: langfuse-mcp
        task: "Check Langfuse health, list all score configs, and list all datasets"
        expected: [health, score, dataset]
      - agent: scholarx-mcp
        task: "Search for recent papers on LLM observability and agent tracing"
        expected: [paper, observability]
        depends_on: []
      - agent: langfuse-mcp
        task: "List all current projects in the Langfuse instance"
        expected: [project]
        depends_on: [0]

  - name: telemetry_ingestion
    description: >
      Extracts anomalous execution traces and success rates
      from Langfuse, then ingests them into the Knowledge Graph
      as ExecutionSummary and PerformanceAnomaly nodes.
    domain: operations
    tags: [telemetry, observability, langfuse, graph-os]
    requires: [langfuse-mcp, graph-os]
    timeout_seconds: 600
    steps:
      - agent: langfuse-mcp
        task: "Fetch recent execution traces and filter for long-running or failed tasks based on baseline configurations."
        expected: [trace, filter]
      - agent: langfuse-mcp
        task: "Calculate overall success rates and token consumption averages across workflows."
        expected: [success, token]
        depends_on: [0]
      - agent: graph-os
        task: "Write Cypher queries using kg_write to ingest ExecutionSummary and PerformanceAnomaly nodes into LadybugDB with relationships to their respective Workflow, Agent, and Tool nodes."
        expected: [cypher, ingest]
        depends_on: [1]
