# OKF-CIS repo SLUG registry (CONCEPT:OS-5.77).
#
# The `<SLUG>` of a concept id is the 2-letter, globally-unique code of the repo
# that OWNS the concept (provenance). SLUG is derived from a marker's file path
# (which repo it physically lives in) — NEVER from its old id prefix, because the
# old prefix conflated provenance with taxonomy (the root disease this fixes).
#
# This is the SINGLE provenance source: agent-packages/scripts/generate_concepts.py
# PREFIX_MAP is regenerated from it, and the migration planner resolves SLUG here.
# Every value MUST be exactly two uppercase letters and globally unique
# (enforced by scripts/check_domain_vocab.py's slug-uniqueness assertion).
#
# Reserve a new SLUG when onboarding a repo; keep the file sorted by key.

