# OKF-CIS closed domain vocabulary (CONCEPT:OS-5.77).
#
# The `domain` level of a concept id `<SLUG>-<PILLAR>.<domain>.<concept>` is the
# ANTI-SPRAWL gate: it is a CLOSED, curated vocabulary per pillar. Auto-derivation
# (scripts/plan_concept_migration.py) may ONLY emit a domain listed here; the CI
# gate scripts/check_domain_vocab.py FAILS the build if any marker's domain is not
# in this file. Breadth is therefore governed; depth (facets) is free.
#
# Adding a NEW domain is a deliberate two-step: propose it in a design doc, add it
# here (with its module-dir/keyword `signals`), then re-run the planner. Never mint
# a domain ad hoc — that is how the flat-number sprawl (233 KG-2.*) reconstitutes.
#
# `signals` seed the planner's auto-derivation: the leaf/second-leaf module dir of a
# concept's code_paths and keyword hits in its name/doc are matched against them.
# The pillars are the ONE global closed set of 6 (agent_utilities.governance
# .concept_hierarchy.PILLARS). A concept's SLUG (repo) is independent of its domain.

