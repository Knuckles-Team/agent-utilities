---
# graph-os runs as a THIN FastMCP wrapper: it serves ONLY the MCP tool surface
# (here over streamable-http on :8004). The Knowledge Graph REST API
# (/api/graph/*, /api/sessions, /api/goals, /api/tools) is served centrally by
# the agent-utilities API gateway (agent_utilities.server.app), not by this
# container. For a pure stdio integration (e.g. the multiplexer), set
# TRANSPORT=stdio and drop the port mapping/healthcheck.
services:
  kg-server-mcp:
    build:
      context: .. # Production
      dockerfile: docker/Dockerfile
    container_name: kg-server-mcp
    hostname: kg-server-mcp
    # Equivalent to the `graph-os` console script; __main__ runs mcp_server().
    command: [ "python", "-m", "agent_utilities.mcp.kg_server" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    volumes:
      - ../data:/app/data
    env_file:
      - path: ../.env
        required: false
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=8004"
      - "TRANSPORT=streamable-http"
    ports:
      - "8004:8004"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
