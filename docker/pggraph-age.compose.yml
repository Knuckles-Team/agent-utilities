# pggraph on Apache AGE (+ pgvector) — real openCypher-on-Postgres.
#
# CONCEPT:KG-2.7 — durable graph tier with native Cypher. Replaces the
# regex-transpiler path (paradedb) with AGE's `cypher()` execution.
#
# Usage:
#   docker compose -f docker/pggraph-age.compose.yml up -d --build
#
# Environment for agent-utilities:
#   GRAPH_BACKEND=postgresql
#   GRAPH_PG_AGE=1
#   GRAPH_DB_URI=postgresql://agent:agent@localhost:5434/agent_kg

services:
  pggraph-age:
    build:
      context: ./pggraph-age
    image: agent-utilities/pggraph-age:latest
    container_name: agent-pggraph-age
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_kg
    ports:
      - "5434:5432"
    volumes:
      - pggraph-age-data:/var/lib/postgresql/data
      - ./pggraph-age-init:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  pggraph-age-data:
