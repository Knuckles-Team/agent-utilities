# pg-age on Apache AGE (+ pgvector) — real openCypher-on-Postgres.
#
# CONCEPT:KG-2.7 — durable graph tier with native Cypher. Replaces the
# regex-transpiler path (paradedb) with AGE's `cypher()` execution.
#
# Usage:
#   docker compose -f docker/pg-age.compose.yml up -d --build
#
# Environment for agent-utilities:
#   GRAPH_BACKEND=postgresql
#   GRAPH_PG_AGE=1
#   GRAPH_DB_URI=postgresql://agent:agent@localhost:5434/agent_kg

services:
  pg-age:
    build:
      context: ./pg-age
    image: agent-utilities/pg-age:latest
    container_name: agent-pg-age
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_kg
    ports:
      - "5434:5432"
    volumes:
      - pg-age-data:/var/lib/postgresql/data
      - ./pg-age-init:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  pg-age-data:
