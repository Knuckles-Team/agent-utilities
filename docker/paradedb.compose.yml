# ParadeDB (pgvector + pg_search) PostgreSQL Stack
# Provides a graph-enabled PostgreSQL instance for the agent-utilities KG backend.
#
# Usage:
#   docker compose -f docker/paradedb.compose.yml up -d
#
# Environment:
#   GRAPH_BACKEND=postgresql
#   GRAPH_DB_URI=postgresql://agent:agent@localhost:5433/agent_kg

services:
  paradedb-db:
    image: paradedb/paradedb:latest
    container_name: agent-paradedb
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agent_kg
    ports:
      - "5433:5432"
    volumes:
      - paradedb-data:/var/lib/postgresql
      - ./paradedb-init:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  paradedb-data:
