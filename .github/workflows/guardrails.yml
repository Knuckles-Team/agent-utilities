name: Guardrails

# Plan 10: wire the guardrail gates into CI. Each gate defends a specific
# failure vector and has a meta-test (tests/gates/) proving it trips on a broken
# fixture. BLOCKING gates currently pass on main and red the build on regression.
# ADVISORY gates (continue-on-error) defend a vector whose pre-existing debt has
# not yet cleared; they warn but never red the build until that debt is paid.
#
# NOTE: this repo is standalone (polyrepo). Every gate runs from the repo root
# against this repo's own scripts/. Cross-repo / workspace-level gates
# (No-PyO3 lives in epistemic-graph; cross-UI parity lives at the workspace
# root) cannot run in isolated CI and are enforced by the pre-commit/workspace
# tooling instead, not here.

on:
  pull_request:
    paths:
      - 'agent_utilities/**'
      - 'scripts/**'
      - 'tests/**'
      - 'docs/**'
      - '.github/workflows/guardrails.yml'
  push:
    branches:
      - 'main'

jobs:
  guardrails:
    name: Guardrail gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gate dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the package core + gate deps. Avoid .[all]: it pulls
          # universal-skills (a circular agent-utilities[agent] -> universal-skills
          # dependency) which may not be on PyPI yet and is unnecessary here. The
          # gates only need the package itself + numpy/pyyaml/pytest.
          pip install -e .
          pip install numpy pyyaml pytest

      # ---- BLOCKING gates (pass today; a regression reds the build) ----------

      - name: No-stub gate
        run: python3 scripts/check_no_stub.py

      - name: Concept-freshness gate
        run: python3 scripts/check_concepts.py

      - name: Genesis-manifest freshness gate
        run: python3 scripts/check_genesis_manifest.py

      - name: Retrieval-quality gate
        run: python3 scripts/check_retrieval_quality.py

      - name: Eval-corpus gate
        run: python3 scripts/check_eval_corpus.py

      - name: Reliability-corpus gate
        run: python3 scripts/check_reliability_corpus.py

      - name: Prod-profile guard
        run: python3 -m pytest tests/scale/test_prod_profile_guard.py -q -p no:cacheprovider -o addopts="" -k "prod or profile"

      - name: Gate meta-tests (prove every gate can fail)
        run: python3 -m pytest tests/gates -q -p no:cacheprovider -o addopts=""

      # BLOCKING: anti-sprawl (versioned clones, conflict artifacts, oversized
      # tracked binaries, merge dividers).
      - name: Anti-sprawl gate
        run: python3 scripts/check_sprawl.py

      # BLOCKING: config-flag anti-sprawl — no NEW bare os.environ.get("KG_/GRAPH_/
      # EPISTEMIC_...") outside core/config.py (ratchet vs scripts/env_flag_baseline.txt).
      - name: Config-flag anti-sprawl gate
        run: python3 scripts/check_no_env_sprawl.py

      # BLOCKING: liveness ratchet (CE-038) — no NEW dead pathways. Complements the
      # static check_wiring gate with the typed-seam/contract-drift + never-executed
      # layers; fails only on regression vs .liveness_baseline.json. Skips cleanly
      # if the code-enhancer skill (universal-skills) is not installed.
      - name: Liveness ratchet gate
        run: python3 scripts/check_liveness.py

      # ADVISORY: the coupling gate enforces that geniusbot imports
      # agent_utilities only via the allowlisted adapter seam. Kept advisory so
      # in-flight decoupling churn cannot red the build. Flip continue-on-error
      # to false once the adapter seam has stabilized.
      - name: Coupling gate (advisory)
        continue-on-error: true
        run: python3 scripts/check_coupling.py
