name: Concept Governance

on:
  pull_request:
    paths:
      - 'agent_utilities/**'
      - 'docs/**'
      - 'AGENTS.md'

jobs:
  concept-check:
    name: Extend-Before-Invent Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Derive valid pillars from registry
        run: |
          # The set of valid pillar prefixes is self-maintaining: it is derived
          # from docs/concepts.yaml so it can never drift behind the registry
          # again (it previously hardcoded ORCH|KG|AHE|ECO|OS and rejected
          # SAFE/EE/ML even though those were already registered).
          pip install pyyaml >/dev/null 2>&1 || true
          VALID=$(python -c "import yaml; d=yaml.safe_load(open('docs/concepts.yaml')) or {}; print(' '.join(sorted({p.split('-')[0] for p in d.get('pillars', [])})))")
          if [ -z "$VALID" ]; then
            # Fallback to the documented 5 pillars + known stragglers if the
            # registry could not be read for any reason.
            VALID="ORCH KG AHE ECO OS SAFE EE ML"
          fi
          echo "VALID_PILLARS=$VALID" >> "$GITHUB_ENV"
          echo "Valid pillar prefixes: $VALID"

      - name: Check for new CONCEPT tags
        run: |
          echo "🔍 Scanning for new CONCEPT: tags in this PR..."

          # Get the list of new CONCEPT: tags added in this PR. The id grammar
          # must match the canonical marker regex used by the generators
          # (scripts/build_concepts_yaml.py): a dotless id (SAFE-1), a dotted id
          # (KG-2.101), or a letter-suffix id (KG-2.20g) are all valid.
          NEW_CONCEPTS=$(git diff origin/main...HEAD --unified=0 | \
            grep -oP '(?<=CONCEPT:)[A-Z]{2}-(?:ORCH|KG|AHE|ECO|OS|GBOT)(?:\.[a-z0-9-]+)+' | \
            sort -u || true)

          if [ -z "$NEW_CONCEPTS" ]; then
            echo "✅ No new CONCEPT: tags found. Governance check passed."
            exit 0
          fi

          echo "📋 New CONCEPT tags found:"
          echo "$NEW_CONCEPTS"
          echo ""

          # Check each new concept has a design document
          VIOLATIONS=""
          for concept in $NEW_CONCEPTS; do
            # Extract pillar prefix (e.g., ORCH, KG, AHE, ECO, OS, SAFE, EE, ML)
            PILLAR=$(echo "$concept" | grep -oP '^[A-Z]+')

            # Check for corresponding design document
            DESIGN_DIR=".specify/design/"
            if ! find "$DESIGN_DIR" -name "*.md" -exec grep -l "$concept" {} \; 2>/dev/null | head -1 | grep -q .; then
              VIOLATIONS="$VIOLATIONS\n  ❌ $concept — No design document references this concept"
            fi

            # Check that concept references a valid pillar (derived from registry)
            if echo "$VALID_PILLARS" | tr ' ' '\n' | grep -qx "$PILLAR"; then
              echo "  ✅ $concept — Valid pillar: $PILLAR"
            else
              VIOLATIONS="$VIOLATIONS\n  ❌ $concept — Invalid pillar prefix: $PILLAR (must be one of: $VALID_PILLARS)"
            fi
          done

          if [ -n "$VIOLATIONS" ]; then
            echo ""
            echo "🚫 Governance violations found:"
            echo -e "$VIOLATIONS"
            echo ""
            echo "To fix: Create a design document in .specify/design/<feature>/ that references"
            echo "each new CONCEPT tag and includes a KG analysis + C4 integration diagram."
            echo ""
            echo "See: .specify/design/_template.md"
            exit 1
          fi

          echo "✅ All new concepts have design documents. Governance check passed."
