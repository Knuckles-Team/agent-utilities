[pytest]
addopts = --timeout=60
asyncio_mode = auto
pythonpath = .
testpaths = tests/unit tests/integration
markers =
    integration: Integration tests using subprocess/TestClient (no external services)
    live: Tests requiring live external services (LLM endpoints, real networks)
env =
    AGENT_UTILITIES_TESTING=true
    KNOWLEDGE_GRAPH_SYNC_BACKGROUND=false
