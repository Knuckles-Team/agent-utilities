[pytest]
addopts = --timeout=300 -m "not live"
asyncio_mode = auto
pythonpath = .
testpaths = tests/unit tests/integration
markers =
    integration: Integration tests using subprocess/TestClient (no external services)
    live: Tests requiring live external services (LLM endpoints, real networks)
    slow: Slow / real-resource timing tests excluded from the fast pre-commit gate (run in full/nightly)
env =
    AGENT_UTILITIES_TESTING=true
    GRAPH_DB_PATH=:memory:
