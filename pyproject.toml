serving = [
    # The serving plane (graph-os MCP, host daemon, messaging): NO heavy ML/native deps.
    # Heavy compute is remote (vLLM) or in the Rust engine; torch/transformers/AVX-ann are
    # excluded on purpose (they SIGILL on old CPUs + bloat the image). See AGENTS.md dep rule.
    #
    # Deliberately EXCLUDED from the serving plane (kept in the host-daemon / domain images):
    #   - finance: scipy + pandas + statsmodels (~360 MB). The only serving consumer was the
    #     `quant` MCP tool's boot-time registration; that registration is now guarded
    #     (mcp/tools/ontology_tools.py) so kg_server boots cleanly without it.
    #   - agent (→ ag-ui/terminal): agent-webui + agent-terminal-ui are FRONTEND component
    #     libs a server never renders, and agent-webui pulls the full pydantic-ai meta
    #     (temporalio/botocore/google-genai/grpc/mistralai, ~140 MB). Replaced by the
    #     `agent-headless` extra (same skill/runtime stack, no frontends).
    #   - documents: pymupdf (~62 MB) is the host daemon's PDF ingestion reader
    #     (engine_tasks._pdf_file_extractor); the MCP query/serving surface never parses PDFs.
    #
    #   - graph (ladybug): a contrib MIRROR backend only (primary store is engine + postgres);
    #     it is opt-in via `[graph]`, never shipped on the serving default. neo4j/falkordb stay
    #     because they remain actively-selectable mirrors; ladybug does not.
    #
    # `engine` (epistemic-graph) + `feeds` (feedparser) moved OUT of base, so the serving
    # plane re-acquires them here: the host daemon needs the engine client (KG compute +
    # code AST parsing) and the rss connector (feed ingestion). Code parsing is delegated to
    # the engine's native tree-sitter — no Python tree-sitter on the serving plane.
    #
    # `owl` (rdflib/owlready2/pyshacl) is DELIBERATELY EXCLUDED from the serving plane
    # (CONCEPT:KG-2.242): the semantic-web stack — SPARQL, OWL DL reasoning, SHACL — is
    # demoted to the engine's native RDF/SPARQL/OWL surface (`client.rdf.*`), which ships
    # in every profile (the pi-tier binary included). rdflib/owlready2/pyshacl are now a
    # true last-resort Python fallback in the `[owl]` extra only, kept import-lazy so
    # `import agent_utilities` + a kg_server boot pull none of them. See AGENTS.md dep rule.
    # CONCEPT:KG-2.3 — the serving/host plane RUNS ingestion + enrichment, so it needs the
    # CANONICAL embedder, not the bare `embeddings` core. `embeddings` pulls only
    # `llama-index-core` (no provider), so `create_embedding_model()` / `make_embed_fn()`
    # (which import `llama_index.embeddings.openai` to talk to the bge-m3 vLLM endpoint) raise
    # `ModuleNotFoundError: No module named 'llama_index.embeddings'` on the host — dead-lettering
    # every document ingest and producing ZERO embeddings fleet-wide. `embeddings-openai` ships the
    # OpenAI-compatible provider (+ llms-openai) the vLLM embedding plane requires. See AGENTS.md.
    "agent-utilities[mcp,engine,feeds,embeddings-openai,neo4j,falkordb,auth,metrics,agent-headless]",
]
