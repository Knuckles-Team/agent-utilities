    "universal-skills>=0.45.0",
    "skill-graphs>=0.38.0",
    "pydantic-ai-skills>=0.11.0",
    "pydantic-ai-slim[mcp,openai,anthropic,ag-ui,ui,web,cli]>=2.0.0,<3.0.0",
    "pydantic-graph>=2.0.0,<3.0.0",
    "fasta2a[pydantic-ai]>=0.6.1",
    "dspy-ai>=3.2.1"
