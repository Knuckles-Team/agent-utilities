[build-system]
requires = ["setuptools>=80.9.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-utilities"
version = "0.2.39"
description = "Agent Utilities for Pydantic AI Agents"
readme = "README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Environment :: Console",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3"]
requires-python = ">=3.10"
dependencies = [
    "tree-sitter>=0.23.2",
    "requests>=2.32.5",
    "urllib3>=2.3.0",
    "pydantic[email]>=2.8.2",
    "pydantic-settings>=2.0.0",
    "PyYAML>=6.0.0",
    "python-dotenv>=1.2.1"]

[[project.authors]]
name = "Audel Rouhi"
email = "knucklessg1@gmail.com"

[project.license]
text = "MIT"

[project.optional-dependencies]
mcp = [
    "fastmcp>=3.2.0",
    "eunomia-mcp>=0.3.10",
    "fastapi>=0.131.0",
    "httpx>=0.28.1"
]
agent = [
    "agent-utilities[mcp,ag-ui]>=0.2.39",
    "universal-skills>=0.1.56",
    "skill-graphs>=0.1.38",
    "pydantic-ai-skills>=0.4.1",
    "pydantic-ai-slim[fastmcp,openai,a2a,ag-ui,web,cli]>=1.77.0",
    "pydantic-graph>=0.1.8"
]
agent-google = [
    "pydantic-ai-slim[google]>=1.77.0"
]
agent-groq = [
    "pydantic-ai-slim[groq]>=1.77.0"
]
agent-mistral = [
    "pydantic-ai-slim[mistral]>=1.77.0"
]
agent-anthropic = [
    "pydantic-ai-slim[anthropic]>=1.77.0"
]
agent-huggingface = [
    "pydantic-ai-slim[huggingface]>=1.77.0"
]
ag-ui = [
    "agent-webui>=0.1.32"]
embeddings = [
    "llama-index-core>=0.14.15"]
embeddings-openai = [
    "agent-utilities[embeddings]>=0.2.39",
    "llama-index-embeddings-openai>=0.5.1"]
embeddings-huggingface = [
    "agent-utilities[embeddings]>=0.2.39",
    "llama-index-embeddings-huggingface>=0.6.1"]
embeddings-ollama = [
    "agent-utilities[embeddings]>=0.2.39",
    "llama-index-embeddings-ollama>=0.8.6"]
logfire = [
    "agent-utilities[agent]>=0.2.39",
    "pydantic-ai-slim[logfire]>=1.77.0"
]
all = [
    "agent-utilities[mcp,agent,agent-google,agent-groq,agent-mistral,agent-anthropic,agent-huggingface,embeddings-openai,embeddings-huggingface,embeddings-ollama,logfire]>=0.2.39"]

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
agent_utilities = ["agent_data/**", "prompts/*.md"]


[tool.setuptools.packages.find]
where = ["."]
