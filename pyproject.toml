# CONCEPT:OS-5.52 — agent-utilities ships its OWN unique skills (and the
# agent-utilities skill-graph + the agent-os-genesis workflow) and contributes
# them like any other agent-package, so `install-skills` drops them into the
# XDG skills dir. The hub is already the BASE prompt provider via the packaged
# `prompts/*.json` (registry_builder ingests them with bare `prompt:<name>` ids),
# so it deliberately does NOT also declare a `prompt_providers` entry-point —
# that would re-ingest the base prompts under a second `agent-utilities/` namespace.
[project.entry-points."agent_utilities.skill_providers"]
agent-utilities = "agent_utilities.skills"

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
agent_utilities = ["agent_data/**", "prompts/*.json", "skills/**", "**/*.ttl", "**/*.owl", "py.typed"]

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E402", "B008", "E501", "B007"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
disallow_untyped_defs = false

# --- mypy debt baseline (see .specify/reports/mypy-remediation-plan.md) ---
# 596 of ~723 errors are [attr-defined] false positives from pydantic-graph generic
# state/deps access: mypy cannot resolve concrete fields (ctx.state.query,
# node.plan, NodeSnapshot.run_id, ...) through BaseNode[StateT, ...] /
# GraphRunContext[StateT, DepsT]. These are framework-pattern noise, not bugs.
# Scope the suppression to attr-defined in the five graph/checkpoint hot files ONLY,
# so every other module — and all NEW code — stays strictly checked. The real fix
# (typed State/Deps protocols on each node generic) is tracked in the remediation
# plan as Phase 2; remove an entry here as each file is properly annotated.
[[tool.mypy.overrides]]
module = [
    "agent_utilities.graph._router_impl",
    "agent_utilities.graph.executor",
    "agent_utilities.graph.verification",
    "agent_utilities.graph.hierarchical_planner",
    "agent_utilities.core.checkpoint.manager",
]
disable_error_code = ["attr-defined"]

[tool.uv]
# pydantic-acp 0.9.7 (the optional `[acp]` extra) over-pins
# `pydantic-ai-slim==1.106.0`, but its code is verified-compatible with v2 — every
# pydantic_ai symbol it imports (AgentRunResultEvent, ModelRequestContext,
# CombinedCapability, DeferredToolResults, ToolApproved/Denied, FunctionModel,
# OutputSpec, …) exists in 2.0.0. Override that transitive pin so `[acp]`
# co-installs on the v2 floor instead of dragging the resolver back to 1.106.
# Remove once pydantic-acp ships a v2-compatible release.
# See docs/architecture/pydantic-ai-v2-migration.md.
override-dependencies = ["pydantic-ai-slim>=2.0.0,<3.0.0"]

[dependency-groups]


[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = "."
timeout = 30
testpaths = ["tests/unit", "tests/integration"]
markers = [
    "integration: Integration tests using subprocess/TestClient (no external services)",
    "live: Tests requiring live external services (LLM endpoints, real networks)",
    "slow: Slow / real-resource timing tests excluded from the fast pre-commit gate (run in full/nightly)",
    "concept(id): Mark test as validating a specific documentation concept (e.g., CONCEPT:ORCH-1.2)"
]
env = [
    "AGENT_UTILITIES_TESTING=true",
    "VALIDATION_MODE=true"
]

[tool.coverage.run]
source = ["agent_utilities"]
omit = ["tests/*", "setup.py"]

[tool.coverage.report]
show_missing = true
fail_under = 70
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if __name__ == .__main__.:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "pass",
    "except ImportError:"
]

[tool.bandit]
exclude_dirs = ["build", "dist", ".venv", "tests"]
skips = ["B101"]
