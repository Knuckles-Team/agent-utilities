[build-system]
requires = ["setuptools>=80.9.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-utilities"
version = "1.6.0"
description = "Agent Utilities for Pydantic AI Agents"
readme = "README.md"
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Environment :: Console",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3"]
requires-python = ">=3.11,<3.15"
# LEAN BASE (the serving/connector floor). Only light, portable, pure-Python (or
# small-native) libs that the bare-import / config / gateway path actually touches.
# Everything heavy — the engine client, the agent runtime (pydantic-ai/dspy), code
# parsing (tree-sitter, now delegated to the engine), llama-index, kafka, monty, acp,
# rss, ladybug — moved to optional extras so `pip install agent-utilities` (and any
# connector's `[mcp]`) stays small. See "Dependency discipline" in AGENTS.md.
dependencies = [
    "pydantic[email]>=2.13.4",
    "pydantic-settings>=2.14.1",
    "PyYAML>=6.0.3",
    "python-dotenv>=1.2.2",
    "requests>=2.34.2",
    "urllib3>=2.7.0",
    "cryptography>=48.0.0,<49",
    "pathspec>=1.1.1",
    "platformdirs>=4.10.0",
    "packaging>=24.2,<26",
    "psutil>=7.2.2",
    "filelock>=3.29.4",
    # Tiny pure-Python safe-XML parser used on the hydration path; kept in base so the
    # XML path is never unguarded.
    "defusedxml>=0.7.1",
    # CONCEPT:KG-2.324 — the numeric kernel is a HARD base dependency (Analytics Program
    # P5 final, the numpy/scipy drop). `agent_utilities.numeric` is the SOLE numeric
    # backend and raises ImportError without the compiled `epistemic_graph.numeric`
    # kernel, so it must be present in every install. There is ONE published package —
    # the `eg-numeric` kernel `.so` is folded into the `epistemic-graph` wheel behind its
    # `numeric` extra (engine CONCEPT:EG-346); `[numeric]` also pulls the numpy the kernel
    # uses INTERNALLY (rust-numpy zero-copy interop). agent-utilities itself imports numpy
    # nowhere. Loose floor (`>=2.7.0`, the release with the full Surface-A op set incl. the
    # array constructors + axis/keepdims reductions + eigsh/spearmanr/ks_2samp/norm ops),
    # never an exact pin. See docs/guides/numeric-kernel.md.
    "epistemic-graph[numeric]>=2.7.0",
]

[[project.authors]]
name = "Audel Rouhi"
email = "knucklessg1@gmail.com"

[project.license]
text = "MIT"

[project.optional-dependencies]
# CONCEPT:ORCH-1.38 — RLM sandbox tiers. `monty` is the default fast/isolated tier
# (small pure-Rust wheel, no transitive deps; backend import guarded so absence degrades
# to the local floor); the CPython-WASI/wasm tier needs `wasmtime`. Both kept here so the
# base install stays light — the RLM router degrades to the local floor when neither is present.
sandbox = [
    "wasmtime>=45.0.0",
    "pydantic-monty>=0.0.18,<0.1.0"
]
# The Rust epistemic-graph compute engine client (KG compute, code AST parsing via the
# engine's native tree-sitter, vector/graph algorithms). Pulled by `serving` and `agent`,
# NOT by `mcp` — a pure tool server never needs the engine.
# Floor pinned to the PUBLISHED 1.0.0 wheel: its client ships `compare_and_set`
# plus the `.rdf` / `.timeseries` / `.streaming` / `.txn` sub-clients and the
# LPG→RDF projection config, and the wheel bundles the prebuilt
# `epistemic-graph-server` binary (next to `sys.executable`) so the test fixture
# resolves it with NO cargo build. The supervised reference-counted
# `--idle-shutdown-secs` autostart contract (CONCEPT:OS-5.63) is in this wheel.
# Floor bumped to 2.6.0 — the engine release that ships the abi3 `eg-numeric`
# kernel wheel (cp39-abi3) folded in behind its `numeric` maturin feature. Still a
# floor (`>=`), never an exact pin: published deps express minimums; dev overlays
# live source via source-mounts + PYTHONPATH.
engine = [
    "epistemic-graph[numeric]>=2.7.0"
]
# CONCEPT:KG-2.324 — the SOLE numeric backend (Analytics Program P5 final, the numpy/scipy
# drop). The numeric kernel is already a HARD BASE dependency (see base `dependencies`
# above: `epistemic-graph[numeric]>=2.7.0`), so `agent_utilities.numeric` is kernel-LIVE in
# every install and raises ImportError if the compiled `epistemic_graph.numeric` kernel is
# absent — there is NO numpy fallback. This extra is kept as an explicit, named alias for
# operators who want to pull the kernel deliberately; it resolves the SAME single published
# package (the `eg-numeric` `.so` folded into the `epistemic-graph` wheel behind its
# `numeric` extra, engine CONCEPT:EG-346 — no separate `eg-numeric` on PyPI), at a LOOSE
# FLOOR (`>=2.7.0`, never an exact pin). `[numeric]` also brings the numpy the kernel uses
# INTERNALLY (rust-numpy interop); agent-utilities imports numpy nowhere.
#   DEV (non-publishing) builds the kernel from source instead: source-mounts +
#   `PYTHONPATH=/au:/eg` (services/graph-os/compose.dev.yml) plus an editable install via
#   `maturin develop -m crates/eg-numeric/Cargo.toml --features python`
#   (`PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1`) on the epistemic-graph project. Dev never
#   depends on the published wheel. See docs/guides/numeric-kernel.md.
numeric-kernel = [
    "epistemic-graph[numeric]>=2.7.0"
]
# CONCEPT:KG-2.121 — native RSS/Atom feed connector (robust feed parsing). Pulled by
# `serving` (ingestion) and lazily imported by the connector; absent from the lean core.
feeds = [
    "feedparser>=6.0.0"
]
kafka = [
    "aiokafka>=0.14.0"
]
# CONCEPT:OS-5.23 — Python-tier gateway Prometheus metrics. Optional so the
# base install stays light; without it every gateway metric degrades to a
# no-op and GET /metrics returns a placeholder.
metrics = [
    "prometheus-client>=0.25.0"
]
nats = [
    "nats-py>=2.15.0"
]
mcp = [
    "fastmcp>=3.4.2",
    "eunomia-mcp>=0.3.10",
    "fastapi>=0.137.0",
    "httpx>=0.28.1"
]
agent = [
