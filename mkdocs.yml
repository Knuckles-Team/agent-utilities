site_name: "agent-utilities"
repo_name: "Knuckles-Team/agent-utilities"
repo_url: "https://github.com/Knuckles-Team/agent-utilities"
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
plugins:
  - search
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Start Here: start-here.md
  - Capabilities: capabilities.md
  - Consumption Models: guides/consumption-models.md
  - Ecosystem: ecosystem.md
  - The Narrative Journey: journey.md
  - Deployment:
      - Day-0 Deployment: guides/day0.md
      - Recipe — Tiny (all-local): recipes/tiny.md
      - Recipe — Single-node prod: recipes/single-node-prod.md
      - Recipe — Enterprise: recipes/enterprise.md
      - Deploying agent-utilities: guides/deployment.md
      - Configuration: guides/configuration.md
      - Enabling Autonomous Evolution: guides/autonomous-evolution.md
      - Tiered Graph Engine: guides/tiered_graph_engine.md
  - Technical Documentation:
      - Graph Orchestration Engine: pillars/1_graph_orchestration.md
      - KG-Native Orchestration: guides/kg_native_orchestration.md
      - Graph-OS MCP Tool Examples: examples/graph-os-mcp-examples.md
      - Recursive Language Models (RLM): guides/rlm.md
      - Epistemic Knowledge Graph: pillars/2_epistemic_knowledge_graph.md
      - Agentic Harness Engineering: pillars/3_agentic_harness_engineering.md
      - Ecosystem & Peripherals: pillars/4_ecosystem_peripherals.md
      - Agent OS Infrastructure: pillars/5_agent_os_infrastructure.md
      - GeniusBot Cockpit: pillars/6_geniusbot_cockpit.md
  - Architecture:
      - C4 Architecture: pillars/architecture_c4.md
      - Vendor-Neutral Enterprise Ontology: architecture/vendor_neutral_enterprise_ontology.md
      - Company Brain Runtime: architecture/company_brain_runtime.md
      - Global Workspace Attention: architecture/global_workspace_attention.md
      - Multi-Agent Social System: architecture/multi_agent_social_system.md
      - In-House Training Substrate: architecture/in_house_training_substrate.md
      - Graph-Native Assimilation Engine: architecture/assimilation_engine.md
      - Knowledge Distillation → Skill-Graphs: architecture/knowledge_distillation_skill_graphs.md
      - Failure-Driven Evolution: architecture/failure_driven_evolution.md
      - Durable-State Externalization: architecture/state_externalization.md
