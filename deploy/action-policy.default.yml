# Shipped conservative ActionPolicy (CONCEPT:OS-5.24).
#
# The single autonomy decision point (orchestration/action_policy.py) loads
# this file when ACTION_POLICY_PATH is unset. Philosophy: every mutating
# operational action is approval_required out of the box; only no-op /
# diagnostic kinds run automatically. Deployments relax this with their own
# YAML (ACTION_POLICY_PATH) or with KG `governance_rule` overrides
# (scope: action_policy), which always win over file rules.
#
# Rule fields:
#   kind:                action kind glob (restart_service, scale_service, ...)
#   target:              target selector glob (service name)
#   tier:                auto | auto_notify | approval_required | forbidden
#   rate_limit:          {max, window_s} — per action+target; exceeded => deny
#   blast_radius:        {max_targets, window_s} — per action kind; exceeded
#                        => queue for approval
#   maintenance_window:  "HH:MM-HH:MM" UTC — auto tiers outside the window are
#                        queued for approval
#
# NOTE: agent_utilities/orchestration/action_policy.py embeds this exact
# policy as DEFAULT_POLICY for installed wheels without a repo checkout —
# keep the two in lock-step (tests/unit/test_action_policy.py asserts parity).
version: 1
defaults:
  tier: approval_required
  rate_limit: {max: 3, window_s: 3600}
  blast_radius: {max_targets: 3, window_s: 3600}
rules:
  - {kind: diagnose, target: "*", tier: auto}
  - {kind: observe, target: "*", tier: auto}
  - {kind: notify, target: "*", tier: auto}
  # Outbound user messaging (CONCEPT:ECO-4.48): governed but default-on (auto+notify);
  # tighten to approval_required for a stricter posture.
  - {kind: message.send, target: "*", tier: auto_notify}
  # Reactions/emotes (CONCEPT:ECO-4.80): cosmetic, low-risk output any entrypoint may
  # render — auto by default. Tighten to forbidden to disable reactions for a
  # principal/context, or scope by target (the channel/surface).
  - {kind: reaction, target: "*", tier: auto}
  # Agent-to-agent bus traffic (CONCEPT:ECO-4.84): a message between sessions is auto+notify
  # (auditable but frictionless); a dispatch (CONCEPT:ORCH-1.80) hands an objective to the
  # fleet — also auto+notify, since the Loop's own mutating steps re-enter the gate. Tighten
  # to approval_required for a stricter posture.
  - {kind: bus.send, target: "*", tier: auto_notify}
  - {kind: bus.dispatch, target: "*", tier: auto_notify}
  - {kind: record_dry_run, target: "*", tier: auto}
  # Sandboxed developer-workspace actions (CONCEPT:OS-5.33) default to auto:
  # the workspace container/process IS the containment boundary. Override any
  # of these to approval_required to require human sign-off on in-sandbox
  # shell/file mutations.
  - {kind: workspace.cmd, target: "*", tier: auto}
  - {kind: workspace.write, target: "*", tier: auto}
  - {kind: workspace.edit, target: "*", tier: auto}
  - {kind: workspace.browse, target: "*", tier: auto}
  # GUI computer-use (CONCEPT:OS-5.57): sandboxed desktop control. auto+notify so
  # the agent loop runs while every desktop mutation is audited; capture is
  # read-only and bypasses the gate. Tighten to approval_required for sign-off.
  - {kind: workspace.computer_use, target: "*", tier: auto_notify}
  # Playbook dispatch is auto+notify: a playbook's mutating steps re-enter
  # the gate individually with their concrete kinds.
  - {kind: run_playbook, target: "*", tier: auto_notify}
  - {kind: restart_service, target: "*", tier: approval_required}
  - {kind: rollback_service, target: "*", tier: approval_required}
  - {kind: scale_service, target: "*", tier: approval_required}
  - {kind: deploy_service, target: "*", tier: approval_required}
  - {kind: redeploy_stack, target: "*", tier: approval_required}
  - {kind: merge_promotion, target: "*", tier: approval_required}
  # Insight Engine closed loop (workstream C4): a mined finding
  # (:AssociationRule/:Anomaly/:PredictedEdge) that cleared its confidence floor
  # and the promotion-governance validator still requires a human before it is
  # promoted from a proposal Claim to a verified one — SAFETY-CRITICAL, this
  # tier must never silently become auto/auto_notify (see
  # tests/unit/test_action_policy.py::test_promote_mined_claim_default_never_auto).
  - {kind: promote_mined_claim, target: "*", tier: approval_required}
  # Closed-loop agent mining (workstream C6): a mined repeated-failure
  # tool-call pattern (:SequentialPattern) that cleared its confidence floor
  # and governance still requires a human before trace_pattern_miner applies
  # any routing/prompt/tool change AND records the pattern's outcome via the
  # EXISTING OutcomeRouter — SAFETY-CRITICAL, this tier must never silently
  # become auto/auto_notify (see
  # tests/unit/knowledge_graph/test_trace_pattern_miner.py::
  # test_route_policy_update_default_never_auto).
  - {kind: route_policy_update, target: "*", tier: approval_required}
  # Spec-level review/veto (CONCEPT:OS-5.73): a distilled :SpecProposal must clear
  # this EARLY gate before it becomes a develop Loop. Default approval_required so
  # the 24/7 loop holds specs for Claude/human review; relax to auto-develop.
  - {kind: spec_promotion, target: "*", tier: approval_required}
  # Secret-store mutations (CONCEPT:OS-5.66): writing/deleting a secret in the
  # engine-encrypted __secrets__ store is sensitive — approval_required. Reads
  # (secret.get / secret.list) are not gated, mirroring the read posture.
  - {kind: secret.set, target: "*", tier: approval_required}
  - {kind: secret.delete, target: "*", tier: approval_required}
  # Retained run-output review gate (CONCEPT:AU-ORCH.runvcs.retained-output-gate): a
  # completed run's world delta is HELD as a proposal, materialized only on accept.
  # run.select (materialize the held fs/KG delta into the real world) IS the review —
  # approval_required. run.discard (drop the proposal, world untouched) is always safe.
  - {kind: run.select, target: "*", tier: approval_required}
  - {kind: run.discard, target: "*", tier: auto}
