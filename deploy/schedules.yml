# Declarative schedule registry — SEED for the unified scheduler (CONCEPT:OS-5.44).
#
# ONE entry per scheduled skill / skill-workflow. On boot these entries seed durable
# :Schedule nodes; the single scheduler tick
# (agent_utilities.core.schedule_engine.run_scheduler_tick) evaluates every node and
# ENQUEUES a scheduled_job :Task for whatever is due — nothing runs inline, and there
# are NO hardcoded per-job ticks. This file is desired-state; the node carries live
# last-run / next-run / failure-backoff state. Adding a recurring job = adding an
# entry here (or registering a :Schedule programmatically). `/cron calendar` surfaces
# the live registry.
#
# Fields:
#   name        unique id (also the last-run state key)
#   description human summary (shown by /cron calendar)
#   cron        standard 5-field "min hour dom month dow"
#   kind        skill | script | workflow | agent
#   ref         skill name / script path / workflow id
#   action      sub-action for kind=skill (routed via _SKILL_HANDLERS)
#   dispatch    deterministic (default) | agent  — agent = LLM, opt-in per entry
#   enabled     true | false
#
# DESIGN SPLIT: detection-style jobs are DETERMINISTIC (run unattended here); LLM
# enhancement / fix-proposal is left to a reviewed on-demand agent run.

schedules:
  # Fleet-wide background ingestion (CONCEPT:KG-2.9): one entry sweeps EVERY
  # configured connector. `ref: all` routes through the generic source-sync
  # dispatch → source_sync(engine, "all", mode="delta") → sweep_all_sources,
  # which fans out over the delta handlers + configured capability sources +
  # materialize extractors. mode=delta + the write-layer content-hash delta keep
  # each run proportional to what changed. This supersedes hand-writing a per-
  # source entry for every connector — keep the individual entries below only
  # where a source needs its OWN cadence (e.g. LeanIX bite-sized 30-min deltas,
  # or a nightly reconcile that the delta sweep does not do).
  - name: all-sources-delta-sweep
    description: Delta-ingest every configured connector into the KG (KG-2.9 fleet sweep).
    cron: "*/20 * * * *" # every 20 minutes — bite-sized, content-hash deduped
    kind: skill
    ref: all
    action: delta
    dispatch: deterministic
    enabled: true

  - name: code-health-sweep
    description: Run the code-enhancer liveness analyzer across all workspace repos (CE-038).
    cron: "0 */4 * * *" # every 4 hours, on the hour
    kind: skill
    ref: code-enhancer
    action: liveness
    dispatch: deterministic
    enabled: true

  - name: leanix-delta-sync
    description: Pull only LeanIX fact sheets changed since the last watermark into the KG (KG-2.9).
    cron: "*/30 * * * *" # every 30 minutes — bite-sized deltas
    kind: skill
    ref: leanix
    action: delta
    dispatch: deterministic
    enabled: true

  - name: leanix-reconcile
    description: Tombstone KG fact sheets that were deleted/archived in LeanIX (KG-2.9).
    cron: "0 3 * * *" # nightly full reconcile (catches deletions deltas miss)
    kind: skill
    ref: leanix
    action: reconcile
    dispatch: deterministic
    enabled: true

  - name: servicenow-sync
    description: Mirror ServiceNow ITSM + CMDB + Technology Reference Model into the KG (KG-2.9).
    cron: "15 */2 * * *" # every 2 hours
    kind: skill
    ref: servicenow
    action: full
    dispatch: deterministic
    enabled: true

  - name: erpnext-sync
    description: Mirror ERPNext assets/inventory + masters into the KG (KG-2.9).
    cron: "45 */2 * * *" # every 2 hours
    kind: skill
    ref: erpnext
    action: full
    dispatch: deterministic
    enabled: true

  # Outbound inventory push — create KG-discovered assets as CMDB CIs. Fail-closed:
  # also requires SERVICENOW_ENABLE_WRITE. Disabled by default (mutates the SoR).
  - name: servicenow-inventory-push
    description: Create the KG's reconciled inventory as ServiceNow CMDB CIs (KG-2.9). Fail-closed.
    cron: "0 4 * * *"
    kind: skill
    ref: servicenow
    action: inventory
    dispatch: deterministic
    enabled: false
