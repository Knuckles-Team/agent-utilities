# Declarative schedule registry (CONCEPT:OS-5.30).
#
# ONE entry per scheduled skill / skill-workflow. The daemon runs a single generic
# scheduler tick (agent_utilities.core.skill_scheduler.run_due_schedules) that reads
# THIS file and dispatches whatever is due — there are NO hardcoded per-job ticks.
# Adding a recurring job = adding an entry here. `/cron calendar` surfaces this list.
#
# Fields:
#   name        unique id (also the last-run state key)
#   description human summary (shown by /cron calendar)
#   cron        standard 5-field "min hour dom month dow"
#   kind        skill | script | workflow | agent
#   ref         skill name / script path / workflow id
#   action      sub-action for kind=skill (routed via _SKILL_HANDLERS)
#   dispatch    deterministic (default) | agent  — agent = LLM, opt-in per entry
#   enabled     true | false
#
# DESIGN SPLIT: detection-style jobs are DETERMINISTIC (run unattended here); LLM
# enhancement / fix-proposal is left to a reviewed on-demand agent run.

schedules:
  - name: code-health-sweep
    description: Run the code-enhancer liveness analyzer across all workspace repos (CE-038).
    cron: "0 */4 * * *" # every 4 hours, on the hour
    kind: skill
    ref: code-enhancer
    action: liveness
    dispatch: deterministic
    enabled: true

  - name: leanix-delta-sync
    description: Pull only LeanIX fact sheets changed since the last watermark into the KG (KG-2.9).
    cron: "*/30 * * * *" # every 30 minutes — bite-sized deltas
    kind: skill
    ref: leanix
    action: delta
    dispatch: deterministic
    enabled: true

  - name: leanix-reconcile
    description: Tombstone KG fact sheets that were deleted/archived in LeanIX (KG-2.9).
    cron: "0 3 * * *" # nightly full reconcile (catches deletions deltas miss)
    kind: skill
    ref: leanix
    action: reconcile
    dispatch: deterministic
    enabled: true

  - name: servicenow-sync
    description: Mirror ServiceNow ITSM + CMDB + Technology Reference Model into the KG (KG-2.9).
    cron: "15 */2 * * *" # every 2 hours
    kind: skill
    ref: servicenow
    action: full
    dispatch: deterministic
    enabled: true

  - name: erpnext-sync
    description: Mirror ERPNext assets/inventory + masters into the KG (KG-2.9).
    cron: "45 */2 * * *" # every 2 hours
    kind: skill
    ref: erpnext
    action: full
    dispatch: deterministic
    enabled: true

  # Outbound inventory push — create KG-discovered assets as CMDB CIs. Fail-closed:
  # also requires SERVICENOW_ENABLE_WRITE. Disabled by default (mutates the SoR).
  - name: servicenow-inventory-push
    description: Create the KG's reconciled inventory as ServiceNow CMDB CIs (KG-2.9). Fail-closed.
    cron: "0 4 * * *"
    kind: skill
    ref: servicenow
    action: inventory
    dispatch: deterministic
    enabled: false
