# MCP Fleet Registry — generated by scripts/gen_mcp_fleet_registry.py.
# Do not edit by hand. One entry per agents/* connector exposing a
# streamable-http MCP server. Consumed by portainer-sync-agent + day0.
#
# Optional per-service reactive-autoscaling block (CONCEPT:OS-5.29), read by
# the leader-only fleet_autoscaler tick (FLEET_AUTOSCALER=1). Because this
# file is machine-generated, declare scaling in the FLEET_DESIRED_STATE_PATH
# override YAML (same per-service shape, layered on top). Example:
#
#   services:
#     - name: vector-mcp
#       scaling:
#         min: 1                # replica floor (>= 0; default 1)
#         max: 3                # replica ceiling (required; >= min)
#         signal: queue_depth   # queue_depth | consumer_lag | cpu | custom metric
#         target: 200           # per-replica target value (required; > 0)
#         scale_up_step: 1      # max replicas added per evaluation (default 1)
#         scale_down_step: 1    # max replicas removed per evaluation (default 1)
#         cooldown_s: 300       # min seconds between scale actions (default 300)
version: 1
defaults:
  transport: streamable-http
  host: 0.0.0.0
  container_port: 8000
  image_registry: docker.io/knucklessg1
